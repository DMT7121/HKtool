<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HikSync Pro | Attendance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="brand">
                <i class="fas fa-fingerprint logo-icon"></i>
                <div class="brand-text">
                    <h1>HikSync <span class="gradient-text">Pro</span></h1>
                    <p>Automated Attendance Bridge</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="sync-now-btn" class="btn btn-primary">
                    <i class="fas fa-sync-alt"></i> Force Sync
                </button>
            </div>
        </header>

        <main>
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h3>Last Successful Sync</h3>
                        <p id="stat-last-sync">--:--:--</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3>Total Synced Today</h3>
                        <p id="stat-total-synced">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-toggle-on"></i></div>
                    <div class="stat-info">
                        <h3>System Status</h3>
                        <p id="stat-status" class="status-badge">Checking...</p>
                    </div>
                </div>
            </section>

            <section class="logs-container glass-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-terminal"></i> Activity Logs</h2>
                    <span class="auto-refresh-indicator"><i class="fas fa-circle-notch fa-spin"></i> Auto-refreshing...</span>
                </div>
                <div id="logs-list" class="logs-content">
                    <!-- Logs will be injected here -->
                    <div class="log-entry system">Initializing monitoring system...</div>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 Antigravity HikSync • DeepMind Powered</p>
                <div class="external-links">
                    <a href="http://127.0.0.1/artemis-web" target="_blank"><i class="fas fa-book"></i> OpenAPI Doc</a>
                    <a href="https://sheets.google.com" target="_blank"><i class="fas fa-table"></i> Google Sheets</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
